<!doctype html>
<html>
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>TalkBack - Student</title>
  <style>
    body { font-family: system-ui, Arial; max-width: 720px; margin: 24px auto; padding: 0 16px; }
    button { font-size: 18px; padding: 10px 14px; margin-right: 8px; cursor: pointer; }
    button:disabled { opacity: 0.5; cursor: not-allowed; }
    .hidden { display:none; }
    .card { border: 1px solid #ddd; border-radius: 10px; padding: 14px; margin: 12px 0; }
    #status { font-weight: 600; }
    .error { color: #d32f2f; background: #ffeaea; border: 1px solid #f5c6cb; border-radius: 8px; padding: 12px; margin: 10px 0; }
    .error a { color: #d32f2f; }
    .recording { color: #d32f2f; font-weight: bold; }
    .success { color: #2e7d32; }
    #timer { font-size: 16px; font-weight: bold; margin-left: 8px; }
    #btnRecord { background: #e0e0e0; border: 2px solid #999; border-radius: 8px; }
    #btnRecord:not(:disabled):hover { background: #f44336; color: white; border-color: #d32f2f; }
    #btnStop { background: #e0e0e0; border: 2px solid #999; border-radius: 8px; }
    #btnStop:not(:disabled) { background: #f44336; color: white; border-color: #d32f2f; }
    #btnSubmit { background: #e0e0e0; border: 2px solid #999; border-radius: 8px; }
    #btnSubmit:not(:disabled) { background: #4caf50; color: white; border-color: #388e3c; }
  </style>
</head>
<body>
  <h1>TalkBack (Student)</h1>

  <div class="card">
    <label>Your name (optional): <input id="name" placeholder="e.g., Andy" /></label>
    <p>Status: <span id="status">Checking...</span></p>
  </div>

  <div id="micError" class="error hidden"></div>

  <div id="recordCard" class="card hidden">
    <p><b>Question time is ON.</b> Record up to 10 seconds and submit.</p>
    <button id="btnRecord">🎤 Record</button>
    <button id="btnStop" disabled>⏹ Stop</button>
    <button id="btnSubmit" disabled>📤 Submit</button>
    <span id="timer"></span>
    <p id="recInfo"></p>
    <audio id="preview" controls class="hidden" style="width:100%; margin-top:8px;"></audio>
  </div>

  <script>
    const statusEl = document.getElementById('status');
    const recordCard = document.getElementById('recordCard');
    const btnRecord = document.getElementById('btnRecord');
    const btnStop = document.getElementById('btnStop');
    const btnSubmit = document.getElementById('btnSubmit');
    const recInfo = document.getElementById('recInfo');
    const preview = document.getElementById('preview');
    const nameEl = document.getElementById('name');
    const micError = document.getElementById('micError');
    const timerEl = document.getElementById('timer');

    let mediaRecorder = null;
    let currentStream = null;
    let chunks = [];
    let blob = null;
    let mimeType = "";
    let recordingTimer = null;
    let recordingStartTime = null;

    // Check if microphone API is available
    function checkMicSupport() {
      if (!navigator.mediaDevices || !navigator.mediaDevices.getUserMedia) {
        const isSecure = location.protocol === 'https:' || location.hostname === 'localhost' || location.hostname === '127.0.0.1';
        if (!isSecure) {
          micError.innerHTML = `
            <b>Microphone access blocked:</b> Your browser requires HTTPS for microphone access.<br><br>
            <b>Fix:</b> Access this page using one of these URLs instead:<br>
            • <a href="http://localhost:5000/">http://localhost:5000/</a> (if on same machine)<br>
            • <a href="http://127.0.0.1:5000/">http://127.0.0.1:5000/</a> (if on same machine)<br><br>
            Or in Chrome, you can allow this site:<br>
            1. Go to <code>chrome://flags/#unsafely-treat-insecure-origin-as-secure</code><br>
            2. Add <code>${location.origin}</code> to the list<br>
            3. Restart Chrome
          `;
        } else {
          micError.innerHTML = `<b>Microphone not supported:</b> Your browser does not support audio recording. Try using Chrome or Firefox.`;
        }
        micError.classList.remove('hidden');
        btnRecord.disabled = true;
        return false;
      }
      return true;
    }

    checkMicSupport();

    async function pollState() {
      try {
        const r = await fetch('/state');
        const s = await r.json();
        if (s.accepting) {
          statusEl.textContent = "Question time: ON";
          statusEl.style.color = "#2e7d32";
          recordCard.classList.remove('hidden');
        } else {
          statusEl.textContent = "Question time: OFF (wait for lecturer)";
          statusEl.style.color = "#d32f2f";
          recordCard.classList.add('hidden');
        }
      } catch (e) {
        statusEl.textContent = "Cannot reach server";
        statusEl.style.color = "#d32f2f";
      }
    }

    setInterval(pollState, 2000);
    pollState();

    function updateTimer() {
      if (!recordingStartTime) return;
      const elapsed = Math.floor((Date.now() - recordingStartTime) / 1000);
      const remaining = 10 - elapsed;
      timerEl.textContent = remaining > 0 ? `${remaining}s left` : "0s";
      timerEl.style.color = remaining <= 3 ? "#d32f2f" : "#333";
    }

    function stopRecording() {
      if (mediaRecorder && mediaRecorder.state === "recording") {
        mediaRecorder.stop();
      }
      if (recordingTimer) {
        clearInterval(recordingTimer);
        recordingTimer = null;
      }
      timerEl.textContent = "";
      recordingStartTime = null;

      // Stop all tracks to release microphone
      if (currentStream) {
        currentStream.getTracks().forEach(track => track.stop());
        currentStream = null;
      }
    }

    btnRecord.onclick = async () => {
      recInfo.textContent = "";
      micError.classList.add('hidden');
      chunks = [];
      blob = null;
      preview.classList.add('hidden');
      btnSubmit.disabled = true;

      try {
        currentStream = await navigator.mediaDevices.getUserMedia({ audio: true });
      } catch (err) {
        console.error("getUserMedia error:", err);
        if (err.name === "NotAllowedError" || err.name === "PermissionDeniedError") {
          micError.innerHTML = `
            <b>Microphone permission denied.</b><br>
            Click the 🔒 icon in your browser's address bar and allow microphone access, then try again.
          `;
        } else if (err.name === "NotFoundError" || err.name === "DevicesNotFoundError") {
          micError.innerHTML = `<b>No microphone found.</b> Please connect a microphone and try again.`;
        } else if (err.name === "NotReadableError" || err.name === "TrackStartError") {
          micError.innerHTML = `<b>Microphone is in use</b> by another app. Close other apps using the mic and try again.`;
        } else {
          const isSecure = location.protocol === 'https:' || location.hostname === 'localhost' || location.hostname === '127.0.0.1';
          if (!isSecure) {
            micError.innerHTML = `
              <b>Microphone access blocked</b> — your browser requires HTTPS.<br><br>
              <b>Fix:</b> Open this page at <a href="http://localhost:5000/">http://localhost:5000/</a> instead.<br><br>
              Or in Chrome: go to <code>chrome://flags/#unsafely-treat-insecure-origin-as-secure</code>,
              add <code>${location.origin}</code>, and restart Chrome.
            `;
          } else {
            micError.innerHTML = `<b>Microphone error:</b> ${err.name} — ${err.message}`;
          }
        }
        micError.classList.remove('hidden');
        btnRecord.disabled = false;
        return;
      }

      // Pick best supported mime type
      const opts = {};
      const preferredTypes = [
        'audio/webm;codecs=opus',
        'audio/webm',
        'audio/ogg;codecs=opus',
        'audio/mp4',
      ];
      for (const type of preferredTypes) {
        if (MediaRecorder.isTypeSupported(type)) {
          opts.mimeType = type;
          break;
        }
      }

      try {
        mediaRecorder = new MediaRecorder(currentStream, opts);
      } catch (err) {
        console.error("MediaRecorder error:", err);
        micError.innerHTML = `<b>Recording not supported:</b> ${err.message}. Try Chrome or Firefox.`;
        micError.classList.remove('hidden');
        currentStream.getTracks().forEach(t => t.stop());
        btnRecord.disabled = false;
        return;
      }

      mimeType = mediaRecorder.mimeType || "audio/webm";

      mediaRecorder.ondataavailable = e => {
        if (e.data && e.data.size) chunks.push(e.data);
      };

      mediaRecorder.onstop = () => {
        blob = new Blob(chunks, { type: mimeType });
        preview.src = URL.createObjectURL(blob);
        preview.classList.remove('hidden');
        btnSubmit.disabled = false;
        btnRecord.disabled = false;
        btnStop.disabled = true;
        recInfo.innerHTML = '<span class="success">Recording complete — preview above, then click Submit.</span>';

        // Release microphone
        if (currentStream) {
          currentStream.getTracks().forEach(track => track.stop());
          currentStream = null;
        }
      };

      mediaRecorder.onerror = (e) => {
        console.error("MediaRecorder error event:", e);
        recInfo.textContent = "Recording error. Please try again.";
        stopRecording();
        btnRecord.disabled = false;
      };

      mediaRecorder.start();
      btnRecord.disabled = true;
      btnStop.disabled = false;
      recInfo.innerHTML = '<span class="recording">🔴 Recording... (auto-stops at 10s)</span>';

      // Timer countdown
      recordingStartTime = Date.now();
      updateTimer();
      recordingTimer = setInterval(updateTimer, 500);

      // Auto stop after 10s
      setTimeout(() => {
        stopRecording();
      }, 10000);
    };

    btnStop.onclick = () => {
      stopRecording();
    };

    btnSubmit.onclick = async () => {
      if (!blob) return;
      btnSubmit.disabled = true;
      recInfo.textContent = "Uploading...";

      const ext = mimeType.includes("webm") ? "webm" : mimeType.includes("ogg") ? "ogg" : "wav";
      const fd = new FormData();
      fd.append("name", nameEl.value || "Anonymous");
      fd.append("audio", blob, `question.${ext}`);

      try {
        const r = await fetch("/upload-question", { method: "POST", body: fd });
        const j = await r.json();
        if (!j.ok) {
          recInfo.textContent = "Upload failed: " + (j.error || "unknown");
          btnSubmit.disabled = false;
          return;
        }
        recInfo.innerHTML = `<span class="success">✓ Submitted! Queue position: ${j.position}</span>`;
        blob = null;
        preview.classList.add('hidden');
        btnRecord.disabled = false;
        btnStop.disabled = true;
        btnSubmit.disabled = true;
      } catch (e) {
        recInfo.textContent = "Upload failed: network error. Try again.";
        btnSubmit.disabled = false;
      }
    };
  </script>
</body>
</html>
